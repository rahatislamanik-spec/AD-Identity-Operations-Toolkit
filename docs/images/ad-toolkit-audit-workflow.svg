<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="386" viewBox="0 0 1200 386" role="img" aria-labelledby="title desc">
<title id="title">AD Toolkit Audit Workflow</title>
<desc id="desc">Scheduled audit, review, remediation, and validation loop</desc>
<rect width="100%" height="100%" fill="#eef3f8"/>
<rect x="30" y="30" width="1140" height="326" rx="16" fill="#ffffff" stroke="#d5deea"/>
<text x="600.0" y="78" text-anchor="middle" font-family="Segoe UI, Arial" font-size="32" font-weight="700" fill="#172033">AD Toolkit Audit Workflow</text>
<text x="600.0" y="108" text-anchor="middle" font-family="Segoe UI, Arial" font-size="16" fill="#53647c">Scheduled audit, review, remediation, and validation loop</text>
<rect x="60" y="140" width="252" height="112" rx="10" fill="#2563a6" stroke="#1d4f86" stroke-width="2"/>
<text x="186.0" y="174" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#ffffff">Scheduled Execution</text>
<text x="186.0" y="202" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff">Daily, weekly, or</text>
<text x="186.0" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff">administrator-launched</text>
<text x="186.0" y="242" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff">PowerShell audit run</text>
<rect x="336" y="140" width="252" height="112" rx="10" fill="#f1fbf8" stroke="#6f8fc0" stroke-width="2"/>
<text x="462.0" y="174" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#172033">Finding Review</text>
<text x="462.0" y="202" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">Stale accounts, privilege</text>
<text x="462.0" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">creep, password policy</text>
<text x="462.0" y="242" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">issues, and group risks</text>
<rect x="612" y="140" width="252" height="112" rx="10" fill="#fff9e8" stroke="#6f8fc0" stroke-width="2"/>
<text x="738.0" y="174" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#172033">Report Generation</text>
<text x="738.0" y="202" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">HTML dashboard templates and</text>
<text x="738.0" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">optional CSV exports</text>
<rect x="888" y="140" width="252" height="112" rx="10" fill="#fff5f4" stroke="#6f8fc0" stroke-width="2"/>
<text x="1014.0" y="174" text-anchor="middle" font-family="Segoe UI, Arial" font-size="18" font-weight="700" fill="#172033">Remediation Queue</text>
<text x="1014.0" y="202" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">Approved actions are tracked</text>
<text x="1014.0" y="222" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">and validated in the next</text>
<text x="1014.0" y="242" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#53647c">run</text>
<rect x="60" y="308" width="1080" height="38" rx="8" fill="#172033"/>
<text x="600.0" y="333" text-anchor="middle" font-family="Segoe UI, Arial" font-size="14" fill="#ffffff">Workflow artifact - generated reports and screenshots are not retained in this repo.</text>
</svg>